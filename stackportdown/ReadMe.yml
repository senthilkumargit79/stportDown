# Step 1 (resolve)
ansible-playbook site.yml

# Step 2 (connectivity)
ansible-playbook playbooks/device_connectivity.yml \
  -e NDHostname="10.10.10.1,10.10.10.2" \
  -e NDUsername=admin -e NDPassword='Cisco@123'

# Step 3 (stack port info)
ansible-playbook playbooks/step3_stackport_info.yml \
  -e NDHostname="10.10.10.1,10.10.10.2" \
  -e NDUsername=admin -e NDPassword='Cisco@123' \
  -e ProcessingInfo="Correlated alerts found, proceeding to stack port data collection."

# Step 5 (validate)
ansible-playbook playbooks/step5_validate_stackport.yml \
  -e NDHostname="10.10.10.1" \
  -e NDUsername=admin -e NDPassword='Cisco@123' \
  -e ProcessingInfo="Validating stack-port properties..." \
  -e GlobalIncidentStatus="" \
  -e remainingLines=""
